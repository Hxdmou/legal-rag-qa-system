version: '3.8'

services:
  # 通用RAG智能问答系统
  rag-general:
    build: .
    container_name: rag-general
    ports:
      - "7861:7861"
    volumes:
      - ./chat_histories:/app/chat_histories
      - ./knowledge_bases:/app/knowledge_bases
      - ./logs:/app/logs
      - ./run_faiss_index:/app/run_faiss_index
    environment:
      - PORT=7861
      - LOG_LEVEL=INFO
    command: ["streamlit", "run", "run.py", "--server.port", "7861", "--server.address", "0.0.0.0"]
    restart: unless-stopped

  # 法律知识问答系统
  rag-legal:
    build: .
    container_name: rag-legal
    ports:
      - "7869:7869"
    volumes:
